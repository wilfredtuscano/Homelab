  services:
    gateway:
      loadBalancer:
        servers:
          - url: "http://10.0.0.1/"
        passHostHeader: true
    router:
      loadBalancer:
        servers:
          - url: "http://192.168.1.1/"
        passHostHeader: true
    portainer:
      loadBalancer:
        servers:
          - url: "https://192.168.1.199:9443/"
        passHostHeader: true
    proxmox:
      loadBalancer:
        servers:
          - url: "https://192.168.1.200:8006/"
        passHostHeader: true
    truenas:
      loadBalancer:
        servers:
          - url: "http://192.168.1.201/"
        passHostHeader: true
    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:8090/"
        passHostHeader: true
    prowlarr:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:9696/"
        passHostHeader: true
    radarr:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:7878/"
        passHostHeader: true
    sonarr:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:8989/"
        passHostHeader: true
    lidarr:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:8686/"
        passHostHeader: true
    readarr:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:8787/"
        passHostHeader: true
    metube:
      loadBalancer:
        servers:
          - url: "http://192.168.1.202:8081/"
        passHostHeader: true
    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.1.203:32400/"
        passHostHeader: true
    vaultwarden:
      loadBalancer:
        servers:
          - url: "http://192.168.1.204:80"
        passHostHeader: true
    ollama:
      loadBalancer:
        servers:
          - url: "http://192.168.1.205:11434/"
        passHostHeader: true
    chat:
      loadBalancer:
        servers:
          - url: "http://192.168.1.205:3000/"
        passHostHeader: true

  middlewares:
    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
    default-whitelist:
      ipAllowList:
        sourceRange:
        - "192.168.1.0/16"
    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers

